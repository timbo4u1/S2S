name: S2S CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install signing dependency
        run: pip install cryptography

      - name: Test PhysicsEngine import
        run: python3 -c "from s2s_standard_v1_3.s2s_physics_v1_3 import PhysicsEngine; print('PhysicsEngine OK')"

      - name: Test PhysicsEngine certify
        run: |
          python3 << 'EOF'
          import math
          from s2s_standard_v1_3.s2s_physics_v1_3 import PhysicsEngine

          n = 100
          dt = 1.0 / n
          timestamps = [int(i * dt * 1e9) for i in range(n)]
          accel = [[0.1 * math.sin(2 * math.pi * 2 * i * dt),
                    0.1 * math.cos(2 * math.pi * 2 * i * dt),
                    9.8] for i in range(n)]
          gyro  = [[0.01 * math.sin(2 * math.pi * 10 * i * dt),
                    0.01 * math.cos(2 * math.pi * 10 * i * dt),
                    0.0] for i in range(n)]

          result = PhysicsEngine().certify(
              imu_raw={"timestamps_ns": timestamps, "accel": accel, "gyro": gyro},
              segment="forearm"
          )

          tier  = result.get('physics_tier',  result.get('tier',  'UNKNOWN'))
          score = result.get('physics_score', result.get('physical_law_score', -1))

          assert tier in ['GOLD','SILVER','BRONZE','REJECTED'], f'Bad tier: {tier}'
          assert 0 <= score <= 100, f'Score out of range: {score}'
          print(f'Certify OK: {tier} {score}/100')
          EOF

      - name: Test signing module
        run: |
          python3 << 'EOF'
          from s2s_standard_v1_3.s2s_signing_v1_3 import CertSigner, CertVerifier
          print('CertSigner OK')
          print('CertVerifier OK')
          EOF

      - name: Test classifier model
        run: |
          python3 << 'EOF'
          import json, os
          model_path = 'model/s2s_domain_classifier.json'
          if os.path.exists(model_path):
              with open(model_path) as f:
                  m = json.load(f)
              acc = m.get('cv_accuracy', m.get('accuracy', '?'))
              n   = m.get('n_records', m.get('total_records', '?'))
              print(f'Classifier OK: {acc} accuracy, {n} records')
          else:
              print('No model file — skipping')
          EOF

      - name: Test dataset adapters
        run: |
          python3 -c "import s2s_dataset_adapter; print('UCI/PAMAP2 adapter OK')"
          python3 -c "import wisdm_adapter; print('WISDM adapter OK')" || echo "wisdm_adapter not found — skipping"

      - name: Zero dependencies check (physics core only)
        run: |
          python3 << 'EOF'
          import ast, os, sys

          # Only check the physics core — the one file that MUST stay zero-dep
          CORE_FILES = [
              's2s_standard_v1_3/s2s_physics_v1_3.py',
          ]

          # Known allowed external deps per module
          ALLOWED_EXTERNAL = {
              's2s_signing_v1_3.py': {'cryptography'},  # Ed25519 signing
              's2s_physics_v1_3.py': {'numpy'},          # optional fast-path (stdlib fallback exists)
          }

          # Internal module names (imports between s2s files are fine)
          INTERNAL = {
              'constants', 's2s_signing_v1_3', 's2s_stream_certify_v1_3',
              's2s_emg_certify_v1_3', 's2s_lidar_certify_v1_3',
              's2s_thermal_certify_v1_3', 's2s_ppg_certify_v1_3',
              's2s_fusion_v1_3', 's2s_registry_v1_3', 's2s_api_v1_3',
              's2s_physics_v1_3', 's2s_ml_interface',
          }

          stdlib_extras = {
              '__future__', 'zlib', 'zlib', 'abc', 'argparse', 'array',
              'ast', 'asyncio', 'base64', 'binascii', 'bisect', 'builtins',
              'cmath', 'collections', 'contextlib', 'copy', 'csv',
              'dataclasses', 'datetime', 'decimal', 'dis', 'email',
              'enum', 'errno', 'fnmatch', 'fractions', 'functools',
              'gc', 'glob', 'gzip', 'hashlib', 'heapq', 'hmac',
              'html', 'http', 'inspect', 'io', 'itertools', 'json',
              'keyword', 'linecache', 'locale', 'logging', 'math',
              'mimetypes', 'numbers', 'operator', 'os', 'pathlib',
              'pickle', 'platform', 'pprint', 'queue', 'random', 're',
              'select', 'shelve', 'shutil', 'signal', 'socket', 'sqlite3',
              'ssl', 'stat', 'string', 'struct', 'subprocess', 'sys',
              'sysconfig', 'tempfile', 'textwrap', 'threading', 'time',
              'timeit', 'tkinter', 'traceback', 'typing', 'unicodedata',
              'unittest', 'urllib', 'uuid', 'warnings', 'weakref',
              'zipfile', 'zipimport', 'zlib',
          }

          if hasattr(sys, 'stdlib_module_names'):
              stdlib = set(sys.stdlib_module_names) | stdlib_extras
          else:
              stdlib = stdlib_extras

          violations = []
          for path in CORE_FILES:
              if not os.path.exists(path):
                  print(f'WARNING: {path} not found — skipping')
                  continue
              fname = os.path.basename(path)
              allowed_ext = ALLOWED_EXTERNAL.get(fname, set())
              tree = ast.parse(open(path).read())
              for node in ast.walk(tree):
                  if isinstance(node, (ast.Import, ast.ImportFrom)):
                      names = [a.name for a in node.names] if isinstance(node, ast.Import) else [node.module]
                      for name in names:
                          top = (name or '').split('.')[0]
                          if (top and top not in stdlib and
                              top not in INTERNAL and
                              top not in allowed_ext and
                              top != 's2s_standard_v1_3'):
                              violations.append(f'{path}: imports {name}')

          if violations:
              print('FAIL — unexpected external deps in physics core:')
              for v in violations: print(f'  {v}')
              sys.exit(1)
          else:
              print('Physics core zero-dependencies check PASSED')
          EOF
